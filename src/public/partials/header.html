<dialog id="settings-dialog" aria-labelledby="dialog-title" class="fixed size-auto overflow-y-auto bg-transparent backdrop:bg-transparent">
  <div class="dialog-backdrop"></div>

  <div tabindex="0" class="flex min-h-full items-center justify-center p-4 text-center items-center sm:p-0">
    <div class="fixed overflow-hidden rounded-lg bg-gray-800 text-left my-8 w-50 sm:w-full max-w-lg inset-ring-1 inset-ring-accent1/30 shadow-sm shadow-secondary">
      <div class="bg-gray-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
        <div class="sm:items-center sm:justify-between">

          <div class="mt-3 text-center sm:mt-0">
            <h3 id="dialog-title" class="text-base font-semibold text-white">Settings</h3>
            <hr class="w-full my-2 h-px border-none bg-gray-500">

            <div>
              <ul>
                <li class="flex justify-between text-center text-white items-center">
                  <i class="bi bi-toggle-on settings-toggle text-4xl fill-white cursor-pointer" data-enabled="true" data-name="sfw"></i>
                  <p class="text-end">SFW Only</p>
                </li>
              </ul>
            </div>

          </div>

        </div>
      </div>
      <div class="bg-gray-700/25 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
        <button type="button" class="dialog-save" id="dialog-save">Save</button>
        <button type="button" class="dialog-cancel" id="dialog-cancel">Cancel</button>
      </div>
    </div>
  </div>
</dialog>
