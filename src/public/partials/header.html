<!-- Alert panel for showing status messages -->
<div id="alert-panel" class="invisible fixed top-0 left-0 w-full md:max-w-lg md:left-1/2 p-4 z-50 bg-accent3 rounded-xl inset-ring-1 inset-ring-accent1/30 shadow-sm shadow-secondary transform -translate-y-full md:-translate-x-1/2 transition-transform duration-300 ease-out">
  <div class="alert-message-container">
    <i id="alert-icon" class="bi bi-exclamation-circle-fill text-left pr-4 text-2xl"></i>
    <p id="alert-msg" class="text-left"></p>
  </div>
</div>

<!-- Main header content -->
<div class="flex items-center justify-between p-4 bg-primary font-syne">
  <a class="flex items-center gap-1 text-white no-underline" href="/index.html">
    <img id="header-icon" src="./images/main-icon-sm.webp" alt="OtakuLog site icon" loading="lazy">
    <h1 class="text-2xl font-bold">OtakuLog</h1>
  </a>

  <!-- Desktop Nav -->
  <nav class="navigation hidden md:block font-syne">
    <ul class="flex flex-row list-none p-0 m-0">
      <li><a data-route="home"     class="nav-link-large" title="Go to the home page">Home</a></li>
      <li><a data-route="account" class="nav-link-large" title="View or create your account">Account</a></li>
      <li><a data-route="search" class="nav-link-large" title="Search for a series">Search</a></li>
      <li><a data-route="lists" class="nav-link-large" title="View your saved lists">Lists</a></li>
      <li>
        <button class="settings-btn nav-link-large" aria-label="Navigation button to open the settings menu" title="Open the settings menu">
          <i class="bi bi-gear-fill"></i>
        </button>
      </li>
      <li class="hidden">
        <button class="logout-btn nav-link-large disabled:bg-secondary/40 disabled:inset-ring-1 disabled:inset-ring-accent1/30 disabled:text-black" aria-label="Navigation button to log out of user's account" title="Log out of account">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </li>
    </ul>
  </nav>

  <!-- Hamburger button mobile -->
  <button id="hamburger-btn" class="flex items-center justify-center w-12 h-12 text-4xl text-white bg-transparent border-none cursor-pointer md:hidden" aria-label="Mobile navigation menu button"><i class="bi bi-list"></i></button>
</div>

<!-- Mobile Nav -->
<nav id="mobile-nav" class="navigation md:hidden absolute top-[95px] left-0 w-full z-40 bg-primary font-syne">
  <ul class="hidden [.open_&]:flex flex-col list-none p-0 m-0">
    <li class="nav-list-small"><a data-route="home" class="nav-link-small">Home</a></li>
    <li class="nav-list-small"><a data-route="account" class="nav-link-small">Account</a></li>
    <li class="nav-list-small"><a data-route="search" class="nav-link-small">Search</a></li>
    <li class="nav-list-small"><a data-route="lists" class="nav-link-small">Lists</a></li>
    <li class="hidden nav-list-small">
      <button class="logout-btn nav-link-small w-full" aria-label="Navigation button to log out of user's account">
        Logout
      </button>
    </li>
    <li class="nav-list-small">
      <button class="settings-btn nav-link-small w-full" aria-label="Navigation button to open the settings menu">
        Settings
      </button>
    </li>
  </ul>
</nav>
<!-- Settings modal -->
<dialog id="settings-dialog" aria-labelledby="dialog-title" class="fixed inset-0 size-auto mx-auto overflow-y-auto bg-transparent backdrop:bg-transparent">
  <button class="dialog-backdrop" aria-label="Close settings dialog" tabindex="0"></button>

  <div tabindex="0" class="flex min-h-full items-center justify-center p-4 text-center items-center sm:p-0">
    <div class="fixed overflow-hidden rounded-lg bg-gray-800 my-8 w-[90vw] sm:w-full max-w-lg inset-ring-1 inset-ring-accent1/30 shadow-sm shadow-secondary">
      <div class="bg-gray-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
        <div class="sm:items-center sm:justify-between">

          <div class="mt-3 text-center sm:mt-0">
            <h3 id="dialog-title" class="text-base font-semibold text-white">Settings</h3>
            <hr class="w-full my-2 h-px border-none bg-gray-500">

            <!-- Content container -->
            <div>
              <ul id="settings-list">
              </ul>
            </div>

          </div>

        </div>
      </div>
      <div class="bg-gray-700/25 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
        <button type="button" class="dialog-save" id="dialog-save" disabled>Save</button>
        <button type="button" class="dialog-cancel" id="dialog-cancel">Cancel</button>
      </div>
    </div>
  </div>
</dialog>

<!-- Background blur overlay for mobile nav -->
<button class="nav-overlay" aria-hidden="true" aria-label="Close mobile navigation menu" tabindex="0"></button>
