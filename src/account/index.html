<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Robbie Yamashita">
    <meta name="description" content="OtakuLog - An anime tv series tracker for ongoing tv series.">
    <title>OtakuLog | Account</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Syne:wght@400..800&display=swap" rel="stylesheet">

    <script type="module" src="/js/main.mjs"></script>
    <script type="module" src="/js/account-page.mjs"></script>
  </head>
  <body class="flex flex-col bg-accent2 text-white font-inter min-h-screen">
    <header></header>

    <main class="flex flex-col h-auto p-2 mt-4">
      <h1 class="font-syne font-bold m-auto text-4xl">Login</h1>
      <hr class="m-4">

      <form id="account-form">
        <label for="username" class="hidden text-xl"><span class="hidden text-red-400" id="required-field">*</span> Username</label>
        <input type="username" name="username" id="username" class="hidden input-box" autocomplete="username" required disabled>

        <label for="email" class="text-xl"><span class="hidden text-red-400" id="required-field">*</span> Email</label>
        <input type="email" name="email" id="email" class="input-box" autocomplete="email" required>

        <label for="password" class="text-xl"><span class="hidden text-red-400" id="required-field">*</span> Password</label>
        <input type="password" name="password" id="password" class="input-box" minlength="8" maxlength="64" autocomplete="password" required>

        <!-- Password quality -->
        <div class="hidden w-full m-auto h-2 mt-1 mb-8 bg-gray-300 rounded" id="pw-quality-bar">
          <div id="strength-bar" class="h-2 rounded transition-all"></div>
          <p id="strength-text" class="mt-1 mr-2 text-right"></p>
        </div>
        <!-- Password suggestions -->
        <div class="hidden flex flex-col m-auto p-2 md:p-4 border-1 border-accent1/30 rounded-xl" id="pw-suggestions">
          Password suggestions:
          <span class="ml-2">
            <i class="bi bi-check-circle-fill md:pr-4" id="pw-length"></i>
            8-64 characters.
          </span>
          <span class="ml-2">
            <i class="bi bi-check-circle-fill md:pr-4" id="pw-guess"></i>
            Hard to guess.
          </span>
          <span class="ml-2">
            <i class="bi bi-check-circle-fill md:pr-4" id="pw-common"></i>
            Not commonly used.
          </span>
        </div>

        <span class="loading-spinner hidden m-auto mt-4 p-3 w-50 text-center border-3 border-secondary bg-secondary/40 text-white rounded-lg bg-secondary text-black"><i class="bi bi-hypnotize inline-block animate-spin"></i></span>
        <input id="submit-form-btn" type="submit" value="Login" class="m-auto mt-4 p-3 w-50 disabled:text-white disabled:bg-secondary/40 border-3 disabled:border-secondary/30 border-secondary hover:not-disabled:bg-secondary/40 hover:not-disabled:text-white rounded-lg bg-secondary text-black transition-colors cursor-pointer disabled:cursor-default" disabled>
        <button id="toggle-form-btn" class="m-auto mt-4 p-2 rounded-xl cursor-pointer underline decoration-solid" data-form-type="Sign up">Sign up</button>
      </form>
    </main>

    <footer class="flex mt-auto flex-col p-4 items-center justify-center text-white bg-primary"></footer>

  </body>
</html>
