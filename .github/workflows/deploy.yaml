name: Deploy OtakuLog to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  VITE_JIKAN_BASE_URL: ${{ secrets.VITE_JIKAN_BASE_URL }}
  VITE_ANILIST_BASE_URL: ${{ secrets.VITE_ANILIST_BASE_URL }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4